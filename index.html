<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Website Donasi Saya</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <header class="bg-blue-600 text-white text-center py-6 shadow-md">
        <h1 class="text-2xl font-bold">Bantu Bersama Yuk!</h1>
        <p class="text-sm opacity-90 mt-1">Uluran tangan Anda sangat berarti bagi mereka</p>
    </header>

    <main class="max-w-md mx-auto p-4 mt-4">
        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <img class="w-full h-48 object-cover" src="https://images.unsplash.com/photo-1488521787991-ed7bbaae773c?w=500" alt="Ilustrasi Donasi">
            
            <div class="p-4">
                <h2 class="text-xl font-bold text-gray-900">Donasi Sembako untuk Lansia</h2>
                <p class="text-gray-600 text-sm mt-2">Mari bersama-sama meringankan beban saudara-saudara lansia kita yang membutuhkan bantuan pangan sehari-hari.</p>
                
                <div class="mt-4 bg-gray-50 p-3 rounded-lg border">
                    <p class="text-xs text-gray-500 uppercase font-semibold">Target Dana</p>
                    <p class="text-lg font-bold text-blue-600">Rp 100.000.000</p>
                </div>

                <div class="mt-6 border-t pt-4">
                    <h3 class="text-md font-bold mb-3 text-gray-700">Isi Data Donasi</h3>
                    
                    <div class="mb-3">
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nama Anda</label>
                        <input id="nama" type="text" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Contoh: hamba allah">
                    </div>

                    <div class="mb-3">
                        <label class="block text-xs font-semibold text-gray-600 mb-1">Nominal Donasi (Rp)</label>
                        <input id="jumlah" type="number" class="w-full p-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Minimal 1000">
                    </div>

                    <button onclick="prosesDonasi()" class="w-full bg-green-500 text-white p-3 rounded-lg font-bold hover:bg-green-600 shadow-md transition mt-2">
                        Donasi Sekarang
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function prosesDonasi() {
            const nama = document.getElementById('nama').value;
            const jumlah = document.getElementById('jumlah').value;

            if (!nama || !jumlah) {
                alert('Tolong isi nama dan jumlah donasinya dulu ya!');
                return;
            }

            // Pesan sementara sebelum kita hubungkan ke server asli nanti
            alert('Terima kasih ' + nama + '! Kamu akan berdonasi sebesar Rp ' + parseInt(jumlah).toLocaleString('id-ID') + '. Langkah selanjutnya kita akan buat tombol ini memunculkan pembayaran otomatis.');
        }
    </script>

</body>
</html>
